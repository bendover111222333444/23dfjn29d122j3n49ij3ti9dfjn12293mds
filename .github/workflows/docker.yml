name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u bendover111222333444 --password-stdin

      - name: Build and Push
        run: |
          docker build -t ghcr.io/bendover111222333444/scramjetprxy:latest .
          docker push ghcr.io/bendover111222333444/scramjetprxy:latest
